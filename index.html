<!DOCTYPE html>
<html>
<head>
  <title>NEXUS-SCRIPTS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="logo">NEXUS-SCRIPTS</div>
</header>

<section class="hero">
  <h1>Script Hub Access</h1>
</section>

<section>
  <h2>Activate Key</h2>
  <input id="keyInput" placeholder="Enter key...">
  <button onclick="activateKey()">Activate</button>
  <p id="status"></p>
</section>

<section>
  <h2>Search Scripts</h2>
  <input id="gameInput" placeholder="Game name">
  <button onclick="searchScript()">Search</button>
  <pre id="result"></pre>
</section>

<script src="app.js"></script>
</body>
</html>
